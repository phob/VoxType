name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.3.2 or v0.3.2"
        required: true
        type: string
      release_notes:
        description: "Optional Markdown release notes. Leave empty to use GitHub generated notes."
        required: false
        type: string
      draft:
        description: "Create the GitHub Release as a draft for review"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  prepare:
    name: prepare release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - id: version
        name: validate version
        shell: bash
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          version="${RAW_VERSION#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release version: $RAW_VERSION" >&2
            exit 1
          fi

          tag="v$version"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "Release tag already exists: $tag" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - run: npm ci

      - name: sync release versions
        run: node scripts/sync-release-version.mjs "${{ steps.version.outputs.version }}"

      - name: build
        run: npm run build

      - id: commit
        name: commit and tag release
        shell: bash
        run: |
          if git diff --quiet -- package.json package-lock.json native/windows-helper/Cargo.toml native/windows-helper/Cargo.lock; then
            echo "Version files already match ${{ steps.version.outputs.version }}."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json package-lock.json native/windows-helper/Cargo.toml native/windows-helper/Cargo.lock
            git commit -m "chore(release): prepare ${{ steps.version.outputs.tag }}"
            git push origin HEAD:main
          fi

          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  windows-installer:
    name: build Windows installer
    runs-on: windows-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - run: node scripts/sync-release-version.mjs "${{ needs.prepare.outputs.version }}" --check

      - name: clean release output
        shell: pwsh
        run: |
          if (Test-Path release) {
            Remove-Item -Recurse -Force release
          }

      - run: npm run release:win

      - name: verify packaged Windows metadata
        shell: pwsh
        run: |
          $exePath = "release\win-unpacked\VoxType.exe"
          if (-not (Test-Path $exePath)) {
            throw "Packaged executable was not found at $exePath."
          }

          $versionInfo = (Get-Item $exePath).VersionInfo
          if ($versionInfo.FileDescription -ne "VoxType") {
            throw "Expected FileDescription to be VoxType, got '$($versionInfo.FileDescription)'."
          }

          if ($versionInfo.ProductName -ne "VoxType") {
            throw "Expected ProductName to be VoxType, got '$($versionInfo.ProductName)'."
          }

      - name: collect release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-publish -Force | Out-Null
          $artifacts = Get-ChildItem -Path release\* -File -Include *.exe,*.blockmap,*.yml,*.yaml |
            Where-Object { $_.Name -notlike "builder-*" }

          if (-not $artifacts) {
            throw "No release artifacts were produced."
          }

          $artifacts | ForEach-Object {
            Copy-Item -LiteralPath $_.FullName -Destination (Join-Path "release-publish" $_.Name)
          }

      - name: generate SHA256 checksums
        shell: pwsh
        run: |
          $artifacts = Get-ChildItem -Path release-publish\* -File -Include *.exe,*.blockmap,*.yml,*.yaml

          if (-not $artifacts) {
            throw "No release artifacts were collected."
          }

          $checksumPath = Join-Path (Resolve-Path release-publish) "SHA256SUMS.txt"
          $artifacts |
            Sort-Object Name |
            ForEach-Object {
              $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName
              "$($hash.Hash.ToLowerInvariant())  $($_.Name)"
            } |
            Set-Content -Path $checksumPath -Encoding utf8

      - uses: actions/upload-artifact@v6
        with:
          name: voxtype-windows-installer-${{ needs.prepare.outputs.version }}
          path: |
            release-publish/*
          if-no-files-found: error

  publish:
    name: publish GitHub release
    runs-on: ubuntu-latest
    needs: [prepare, windows-installer]
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: voxtype-windows-installer-*
          merge-multiple: true
          path: release-assets

      - name: write manual release notes
        if: ${{ inputs.release_notes != '' }}
        shell: bash
        env:
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: printf '%s\n' "$RELEASE_NOTES" > RELEASE_NOTES.md

      - name: publish release with manual notes
        if: ${{ inputs.release_notes != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.sha }}
          name: VoxType ${{ needs.prepare.outputs.tag }}
          body_path: RELEASE_NOTES.md
          draft: ${{ inputs.draft }}
          make_latest: ${{ !inputs.draft }}
          files: |
            release-assets/*.exe
            release-assets/*.blockmap
            release-assets/*.yml
            release-assets/*.txt
          fail_on_unmatched_files: true

      - name: publish release with generated notes
        if: ${{ inputs.release_notes == '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.sha }}
          name: VoxType ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          draft: ${{ inputs.draft }}
          make_latest: ${{ !inputs.draft }}
          files: |
            release-assets/*.exe
            release-assets/*.blockmap
            release-assets/*.yml
            release-assets/*.txt
          fail_on_unmatched_files: true
