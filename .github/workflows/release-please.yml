name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  windows-installer:
    name: build Windows installer
    runs-on: windows-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - run: npm run release:win

      - name: Upload installer artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $artifacts = Get-ChildItem -Path release\* -File -Include *.exe,*.blockmap,*.yml,*.yaml

          if (-not $artifacts) {
            throw "No release artifacts were produced."
          }

          $artifactPaths = $artifacts | ForEach-Object { $_.FullName }
          gh release upload "${{ needs.release-please.outputs.tag_name }}" @artifactPaths --clobber

      - uses: actions/upload-artifact@v6
        with:
          name: voxtype-windows-installer
          path: |
            release/*.exe
            release/*.blockmap
            release/*.yml
            release/*.yaml
